<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Walden Bailey Chiropractic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --bg2:     #0f0f0f;
      --gold:    #FFB612;
      --gold-dk: #d99a00;
      --gold-lt: #ffd066;
      --text:    #f0ece2;
      --muted:   #9a9585;
      --border:  #2a2620;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      overflow-x: hidden;
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700;
      line-height: 1;
      color: var(--gold);
      letter-spacing: -0.02em;
      text-shadow: 0 0 60px rgba(255, 182, 18, 0.25);
    }

    .photo-wrap {
      margin: 1.5rem auto;
      width: clamp(160px, 40vw, 260px);
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--gold);
      box-shadow: 0 0 40px rgba(255, 182, 18, 0.18), 0 8px 32px rgba(0,0,0,0.6);
      aspect-ratio: 1 / 1;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .subtext {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
      max-width: 380px;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .btn-home {
      display: inline-block;
      background: var(--gold);
      color: #080808;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.85rem 2.2rem;
      border-radius: var(--radius);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(255, 182, 18, 0.25);
    }

    .btn-home:hover {
      background: var(--gold-lt);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 182, 18, 0.35);
    }

    .btn-home:active {
      transform: translateY(0);
    }

    .footer-note {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #3a3630;
    }
  </style>
</head>
<body>

  <div class="error-code">404</div>

  <div class="photo-wrap">
    <img
      src="https://res.cloudinary.com/dsodeeokk/image/upload/w_520,c_fill,g_face,q_auto,f_auto/walden-office/imrhk0e7skscrgytsgai.jpg"
      alt="Dr. Ward at Walden Bailey Chiropractic"
    />
  </div>

  <h1 class="headline">Looks like this page needs an adjustment.</h1>

  <p class="subtext">
    We couldn't find what you were looking for — but Dr. Ward is standing by.<br>
    Let's get you back in alignment.
  </p>

  <a href="/" class="btn-home">Back to Home</a>

  <p class="footer-note">Walden Bailey Chiropractic &bull; Buffalo, NY &bull; (716) 893-9200</p>

</body>
</html>
